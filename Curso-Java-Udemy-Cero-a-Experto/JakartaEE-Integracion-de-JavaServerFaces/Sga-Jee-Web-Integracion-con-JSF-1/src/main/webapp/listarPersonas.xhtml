<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"    
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
      xmlns:ui="jakarta.faces.facelets" 
      xmlns:c="jakarta.tags.core">
    <h:head>
        <title>Listado de Personas</title>
    </h:head>
    <h:body>
        <p:ajaxStatus style="width: 16px; height: 16px;" id="ajaxStatusPanel">
            <f:facet name="start">
                <h:graphicImage library="images" name="ajaxloading.gif" />
            </f:facet>

            <f:facet name="complete">
                <h:outputText value="" />
            </f:facet>

        </p:ajaxStatus>

        <h:form prependId="false">
            <p:growl id="messages" showDetail="true" />

            <p:dataTable value="#{personaBean.personas}" var="persona" editable="true"
                         style="width:80%" paginator="true" rows="10" stripedRows="true" >
                <f:facet name="header">
                    Listado de Personas
                </f:facet>
                <p:column headerText="Nombre">
                    <p:cellEditor>
                        <f:facet name="output">
                            <h:outputText value="#{persona.nombre}" />
                        </f:facet>

                        <f:facet name="input" >
                            <p:inputText value="#{persona.nombre}" />
                        </f:facet>

                    </p:cellEditor>
                </p:column>

                <p:column headerText="Nombre">
                    <p:cellEditor>
                        <f:facet name="output">
                            <h:outputText value="#{persona.apellido}" />
                        </f:facet>

                        <f:facet name="input" >
                            <p:inputText value="#{persona.apellido}" />
                        </f:facet>

                    </p:cellEditor>
                </p:column>

                <p:column headerText="Nombre">
                    <p:cellEditor>
                        <f:facet name="output">
                            <h:outputText value="#{persona.email}" />
                        </f:facet>

                        <f:facet name="input" >
                            <p:inputText value="#{persona.email}" />
                        </f:facet>

                    </p:cellEditor>
                </p:column>

                <p:column headerText="Nombre">
                    <p:cellEditor>
                        <f:facet name="output">
                            <h:outputText value="#{persona.telefono}" />
                        </f:facet>

                        <f:facet name="input" >
                            <p:inputText value="#{persona.telefono}" />
                        </f:facet>

                    </p:cellEditor>
                </p:column>

                <f:facet name="footer">
                    <h:commandButton value="Regresar" action="index" />
                </f:facet>

                <p:column headerText="Opciones" style="width: 80px" >
                    <p:rowEditor/>
                </p:column>

                <p:ajax event="rowEdit" listener="#{personaBean.editListener}" />

        </p:dataTable>
    </h:form>
</h:body>
</html>
