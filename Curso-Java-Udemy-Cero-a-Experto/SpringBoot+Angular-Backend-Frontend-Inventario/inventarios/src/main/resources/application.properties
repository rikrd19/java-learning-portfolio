spring.application.name=inventarios

# MySQL database connection
spring.datasource.url=jdbc:mysql://localhost:3307/inventarios_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=curso123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Console log pattern (instead of logback-spring.xml)
logging.pattern.console=[%thread] %-5level: %logger - %msg%n

# Log levels
#logging.level.root=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.boot.tomcat=INFO
#logging.level.org.apache.catalina=INFO

# Optional package log levels
#logging.level.com.avila.webservices=DEBUG

# Optional server port
# server.port=8081

# Spring Boot banner: console (default), log, or off
#spring.main.banner-mode=off
#spring.main.banner-mode=log
#spring.main.banner-mode=console