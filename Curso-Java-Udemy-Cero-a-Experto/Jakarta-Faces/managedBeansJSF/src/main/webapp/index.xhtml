<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html">
    <h:head>
        <meta charset="UTF-8"/>
        <title>ManagedBeans en JSF</title>
    </h:head>
    <h:body>
        <h:form>
            <table>
                <tr>
                    <td><h:outputLabel for="nombre" value="Nombre:" ></h:outputLabel></td>
                    <td><h:inputText id="nombre" value="#{candidato.nombre}"></h:inputText></td>
                    <td><h:message for="nombre" ></h:message></td>
                </tr>
                <tr>
                    <td><h:outputLabel value="Resultado:"></h:outputLabel></td>
                    <td><h:outputLabel value="#{candidato.nombre}" ></h:outputLabel></td>
                </tr>
            </table>
        </h:form>
    </h:body>
</html>
