<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core">
    <h:head>
        <meta charset="UTF-8"/>
        <title>Bolsa de Trabajo V1</title>
    </h:head>
    <h:body>
        <h:form>
            <h:messages globalOnly="true" />
            <table>
                <tr>
                    <td><h:outputLabel for="nombre" value="Nombre:"></h:outputLabel></td>
                    <td><h:inputText id="nombre" value="#{candidato.nombre}" required="true"></h:inputText></td>
                    <td><h:message for="nombre"></h:message></td>
                </tr>
                <tr>
                    <td><h:outputLabel for="apellido" value="Apellido"></h:outputLabel></td>
                    <td><h:inputText id="apellido" required="true" value="#{candidato.apellido}"></h:inputText></td>
                    <td><h:message for="apellido" /></td>
                </tr>
                <tr>
                    <td><h:outputLabel for="salarioDeseado" value="Salario Deseado: "/></td>
                    <td><h:inputText id="salarioDeseado" required="true" value="#{candidato.salarioDeseado}">
                            <f:validateLongRange minimum="500" maximum="5000"/>
                        </h:inputText>
                    </td>
                    <td><h:message for="salarioDeseado"/></td>
                </tr>
            </table>
            <h:commandButton action="#{vacanteForm.enviar}" value="Enviar" />
        </h:form>
    </h:body>
</html>
