#spring.application.name=EmpleadosApp

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3307/empleados_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=curso123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSP views
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Application context path
server.servlet.context-path=/empleados

# Embedded Tomcat (required for JSP)
spring.main.web-application-type=servlet

# Server port
server.port=8080

# Logging
logging.level.org.hibernate=ERROR
logging.level.org.springframework.data=WARN
